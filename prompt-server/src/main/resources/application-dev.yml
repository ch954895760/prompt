server:
  port: 8060
  servlet:
    context-path: /api

spring:
  application:
    name: prompt-server
  datasource:
    url: jdbc:mysql://36.151.148.151:3306/prompt_vault?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: bpm@1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: 192.168.10.202
      port: 6379
      database: 4
      password: hc
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.prompt.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: prompt-vault-jwt-secret-key-2026-very-long-and-secure-key
  access-token-expiration: 7200000
  refresh-token-expiration: 604800000

logging:
  level:
    com.prompt: debug
    org.springframework.security: debug
